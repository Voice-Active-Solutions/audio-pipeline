name: Docker Image CI

on:
  push:
    tags:
      - v*    
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_NAME: jamespeechly/audio-pipeline
  DO_PUSH: ${{ github.ref == 'refs/heads/main' || github.event_name == 'release' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Echo PR Merged
        run: echo "Pull request successfully merged.Branch name is ${{ github.head_ref }}"

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Metadata for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=semver,pattern={{version}},value=v1.0.5

      - name: Build and Push
        if: env.DO_PUSH == 'true'
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
